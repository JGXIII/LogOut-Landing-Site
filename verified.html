<!DOCTYPE html>
<html lang="en">
<head>
  <title>Email verified &mdash; LogOut</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0f0c">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0b0f0c;
      color: #e6e6e6;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      height: 4px;
      background: linear-gradient(90deg, #226340 0%, #2D8050 50%, #ff8c2a 100%);
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .checkmark {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #121a14;
      border: 1px solid #1f2b22;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 26px;
      box-shadow: 0 6px 24px rgba(45, 128, 80, 0.22);
    }
    h1 {
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: #f4f1e8;
      margin: 0 0 12px;
    }
    .sub {
      font-size: 16px;
      color: rgba(244, 241, 232, 0.65);
      max-width: 380px;
      margin: 0 auto 36px;
      line-height: 1.5;
    }
    .cta {
      display: inline-block;
      padding: 14px 30px;
      background: linear-gradient(135deg, #226340 0%, #2D8050 100%);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 120ms ease;
    }
    .cta:hover { transform: translateY(-1px); }
    .note {
      font-size: 12.5px;
      color: rgba(244, 241, 232, 0.36);
      margin: 18px 0 0;
    }
    footer {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(244, 241, 232, 0.36);
    }
    footer a {
      color: rgba(244, 241, 232, 0.55);
      text-decoration: none;
      margin: 0 8px;
    }
    footer a:hover { color: #7fbf7f; }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <main>
    <div class="checkmark">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
           fill="none" stroke="#7fbf7f" stroke-width="3"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 12 10 17 19 8"/>
      </svg>
    </div>
    <h1>Email verified.</h1>
    <p class="sub">
      You're all set. Open LogOut on your phone to keep going.
    </p>

    <!--
      `logout://` is the app's custom URL scheme already wired up in
      LogOutApp.onOpenURL. If the app is installed, tapping this button
      launches it directly. If not, iOS shows a "Cannot Open Page" dialog
      and the visible "Open LogOut" wording reminds them to open it
      manually from the Home Screen.
    -->
    <a class="cta" href="logout://timer">Open LogOut</a>
    <p class="note">Already in the app? You can close this tab.</p>
  </main>

  <footer>
    <a href="https://logoutapp.net">Home</a>
    &middot;
    <a href="https://logoutapp.net/terms.html">Terms</a>
    &middot;
    <a href="https://logoutapp.net/privacy.html">Privacy</a>
  </footer>

</body>
</html>
